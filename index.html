<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>A4-Принт | Копировальный центр</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #0066B3; --blue-dark: #004c8a; --orange: #f59e0b; --green: #10b981;
            --red: #ef4444; --purple: #8b5cf6; --pink: #ec4899; --gray-50: #f9fafb;
            --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
            --white: #ffffff; --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { background: var(--gray-50); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif; padding: 20px; color: var(--gray-800); }
        body.dark { background: #121826; color: #e2e8f0; }
        body.dark .left-panel, body.dark .cart-panel, body.dark .history-section, body.dark .header, body.dark .shift-bar, body.dark .modal-card { background: #1e293b; border-color: #334155; }
        body.dark .service-card, body.dark .goods-card, body.dark .cart-item, body.dark .history-item { background: #0f172a; border-color: #334155; }
        body.dark input, body.dark select, body.dark textarea { background: #0f172a; border-color: #334155; color: #e2e8f0; }
        .app { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; padding: 16px 24px; background: var(--white); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--gray-200); }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo { height: 44px; width: auto; border-radius: 8px; }
        h1 { font-size: 20px; font-weight: 700; }
        .sub { font-size: 12px; color: var(--gray-500); }
        .user-bar { display: flex; gap: 12px; align-items: center; background: var(--gray-100); padding: 6px 20px; border-radius: 40px; flex-wrap: wrap; }
        button { background: var(--blue); border: none; padding: 8px 20px; border-radius: 8px; color: white; font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.15s; }
        button:hover { background: var(--blue-dark); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { background: var(--gray-100); transform: none; }
        .btn-primary { background: var(--blue); }
        .btn-success { background: var(--green); }
        .btn-danger { background: var(--red); }
        .btn-warning { background: var(--orange); }
        .btn-purple { background: var(--purple); }
        .btn-pink { background: var(--pink); }
        .shift-bar { background: var(--white); border-radius: 12px; padding: 12px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .shift-stats { display: flex; gap: 24px; flex-wrap: wrap; }
        .shift-stat-item { background: var(--gray-100); padding: 6px 14px; border-radius: 20px; }
        .shift-stat-label { font-size: 11px; color: var(--gray-500); }
        .shift-stat-value { font-weight: 700; font-size: 16px; color: var(--blue); }
        .dashboard { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
        .left-panel { flex: 2; min-width: 300px; background: var(--white); border-radius: 12px; padding: 24px; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .cart-panel { flex: 1.2; min-width: 380px; background: var(--white); border-radius: 12px; padding: 24px; border: 1px solid var(--gray-200); box-shadow: var(--shadow); }
        .history-section { background: var(--white); border-radius: 12px; padding: 24px; border: 1px solid var(--gray-200); box-shadow: var(--shadow); margin-top: 24px; }
        .panel-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 20px; }
        .category-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--gray-200); padding-bottom: 4px; }
        .category-tab { background: transparent; color: var(--gray-600); padding: 8px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; }
        .category-tab.active { background: var(--blue); color: white; }
        .search-input { width: 100%; padding: 12px 16px; font-size: 14px; border-radius: 10px; background: var(--gray-50); border: 1px solid var(--gray-200); margin-bottom: 20px; }
        .services-grid, .goods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; max-height: 480px; overflow-y: auto; }
        .service-card, .goods-card { background: var(--gray-50); border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; border: 1px solid var(--gray-200); transition: all 0.15s; }
        .service-card:hover, .goods-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--blue); }
        .item-name { font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        .item-price { font-size: 18px; font-weight: 700; color: var(--blue); margin: 8px 0; }
        .item-stock { font-size: 12px; color: var(--gray-500); margin-bottom: 10px; }
        .qty-control input { width: 80px; text-align: center; padding: 8px 0; border-radius: 8px; border: 1px solid var(--gray-300); background: white; }
        .add-btn { background: var(--blue); width: 100%; padding: 8px; font-size: 12px; margin-top: 8px; border-radius: 8px; cursor: pointer; }
        .fast-service-card { background: var(--gray-50); border-radius: 12px; padding: 16px; margin-top: 20px; border: 1px solid var(--gray-200); }
        .fast-service-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .fast-service-row input { flex: 1; min-width: 120px; }
        .cart-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { background: var(--gray-50); border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-left: 3px solid var(--blue); }
        .cart-item-info { flex: 2; }
        .cart-item-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .cart-item-detail { font-size: 11px; color: var(--gray-500); }
        .cart-item-price { font-weight: 700; font-size: 15px; color: var(--blue); min-width: 80px; text-align: right; }
        .remove-btn { background: var(--gray-200); color: var(--gray-700); padding: 6px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: var(--white); border: 1px solid var(--gray-300); border-radius: 10px; font-size: 14px; font-family: inherit; }
        .total-line { display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--gray-200); font-weight: 500; }
        .total-profit { color: var(--green); font-weight: 700; }
        .row-2 { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; align-items: flex-end; }
        .discount-group { flex: 1; min-width: 100px; }
        .history-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; }
        .history-item { background: var(--gray-50); border-radius: 10px; padding: 14px; border-left: 3px solid var(--orange); margin-bottom: 8px; }
        .history-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
        .history-info { flex: 1; font-size: 13px; }
        .history-info strong { font-size: 14px; }
        .history-items { font-size: 11px; color: var(--gray-500); padding-top: 6px; border-top: 1px dashed var(--gray-200); margin-top: 6px; }
        .history-actions { display: flex; gap: 8px; }
        .edit-order-btn { background: var(--blue); color: white; border: none; padding: 4px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .delete-order-btn { background: var(--red); color: white; border: none; padding: 4px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; border-radius: 16px; max-width: 600px; width: 95%; max-height: 85vh; overflow-y: auto; padding: 24px; box-shadow: var(--shadow-md); }
        .edit-item-row { display: flex; gap: 8px; align-items: center; padding: 8px; background: var(--gray-100); margin-bottom: 8px; border-radius: 8px; flex-wrap: wrap; }
        .edit-item-name { flex: 2; font-size: 13px; }
        .edit-item-price { width: 70px; font-size: 13px; }
        .edit-item-qty { width: 80px; padding: 6px; border-radius: 6px; border: 1px solid var(--gray-300); }
        .remove-edit-item { background: var(--red); color: white; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
        .add-item-row { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--gray-200); flex-wrap: wrap; }
        .burger-btn { display: none; background: transparent; font-size: 24px; color: var(--gray-700); padding: 8px; cursor: pointer; }
        .burger-menu { position: absolute; top: 70px; right: 20px; background: white; border-radius: 12px; padding: 16px; min-width: 200px; display: none; flex-direction: column; gap: 10px; box-shadow: var(--shadow-md); z-index: 200; border: 1px solid var(--gray-200); }
        .burger-menu.show { display: flex; }
        .sync-status { position: fixed; bottom: 20px; right: 20px; background: var(--gray-800); color: white; padding: 8px 16px; border-radius: 12px; font-size: 12px; z-index: 999; }
        @media (max-width: 850px) { body { padding: 16px; } .user-bar { display: none !important; } .burger-btn { display: block; } }
        @media (min-width: 851px) { .burger-menu { display: none !important; } }
        .report-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .instruction-content { display: none; }
        .instruction-content.active { display: block; }
    </style>
</head>
<body>

<div id="loginOverlay" class="modal" style="display: flex;">
    <div class="modal-card" style="max-width: 380px;">
        <div style="text-align:center; margin-bottom: 20px;">
            <img src="https://github.com/a4print2026-jpg/baza/blob/dbcda72ab60f0a9f8d8984e17375f6649cf677f0/images/logo_soc2.png?raw=true" style="height: 60px;" onerror="this.style.display='none'">
            <h2>A4-Принт</h2>
        </div>
        <select id="loginSelect">
            <option value="">— Выберите оператора —</option>
            <option value="pavel">Павел (Администратор)</option>
            <option value="ksenia">Ксения (Оператор)</option>
            <option value="natalia">Наталья (Оператор)</option>
        </select>
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="loginBtn" style="width:100%; margin-top: 20px;">Войти</button>
        <div id="loginError" style="color:var(--red); margin-top: 16px; text-align:center;"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
    <div class="app">
        <div class="header">
            <div class="logo-area">
                <img src="https://github.com/a4print2026-jpg/baza/blob/dbcda72ab60f0a9f8d8984e17375f6649cf677f0/images/logo_soc2.png?raw=true" class="logo" onerror="this.style.display='none'">
                <div><h1>A4‑ПРИНТ</h1><div class="sub">Копировальный центр</div></div>
            </div>
            <div class="user-bar">
                <span id="currentOperatorName"></span>
                <button id="themeToggleBtn" class="btn-outline">🌙 Тёмная</button>
                <button id="adminPanelBtn" class="btn-primary">Админ</button>
                <button id="shiftToggleBtn" class="btn-warning">🚀 Открыть смену</button>
                <button id="reportMainBtn" class="btn-success">📊 Отчёт</button>
                <button id="logoutBtn" class="btn-outline">Выйти</button>
            </div>
            <button class="burger-btn" id="burgerBtn">☰</button>
            <div class="burger-menu" id="burgerMenu"></div>
        </div>

        <div class="shift-bar">
            <div><span>🕒 Смена: <strong id="shiftStatus">Закрыта</strong></span>
            <span style="margin-left: 16px;">🟢 Открыта: <span id="shiftOpenTime">—</span></span>
            <span style="margin-left: 16px;">🔴 Закрыта: <span id="shiftCloseTime">—</span></span></div>
            <div class="shift-stats">
                <div class="shift-stat-item"><div class="shift-stat-label">💰 Выручка</div><div class="shift-stat-value" id="shiftRevenue">0 ₽</div></div>
                <div class="shift-stat-item"><div class="shift-stat-label">💵 Наличные</div><div class="shift-stat-value" id="shiftCash">0 ₽</div></div>
                <div class="shift-stat-item"><div class="shift-stat-label">💳 Карта</div><div class="shift-stat-value" id="shiftCard">0 ₽</div></div>
                <div class="shift-stat-item"><div class="shift-stat-label">📊 Прибыль</div><div class="shift-stat-value" id="shiftProfit">0 ₽</div></div>
            </div>
        </div>

        <div class="dashboard">
            <div class="left-panel">
                <div class="category-tabs"><button class="category-tab active" data-cat="services">📋 УСЛУГИ</button><button class="category-tab" data-cat="goods">🛍️ ТОВАРЫ</button></div>
                <div id="servicesPanel" class="instruction-content active">
                    <input type="text" id="searchService" class="search-input" placeholder="Поиск услуги...">
                    <div id="servicesGrid" class="services-grid"></div>
                    <div class="fast-service-card"><div class="fast-service-row"><input type="text" id="fastServiceName" placeholder="Разовая услуга"><input type="number" id="fastServicePrice" placeholder="Цена ₽"><button id="addFastServiceBtn" class="btn-primary">➕ Добавить</button></div></div>
                </div>
                <div id="goodsPanel" class="instruction-content">
                    <input type="text" id="searchGoods" class="search-input" placeholder="Поиск товара...">
                    <div id="goodsGrid" class="goods-grid"></div>
                    <div class="fast-service-card"><div class="fast-service-row"><input type="text" id="newGoodsName" placeholder="Новый товар"><input type="number" id="newGoodsPrice" placeholder="Цена ₽"><input type="number" id="newGoodsStock" placeholder="Кол-во"><button id="addNewGoodsBtn" class="btn-primary">➕ Добавить товар</button></div></div>
                </div>
            </div>

            <div class="cart-panel">
                <div class="panel-title">🧾 КОРЗИНА</div>
                <input type="text" id="clientName" placeholder="Имя клиента" style="margin-bottom: 12px;">
                <input type="tel" id="clientPhone" placeholder="Телефон клиента" style="margin-bottom: 12px;">
                <div class="expense-field" style="margin: 12px 0; padding: 12px; background: var(--gray-100); border-radius: 10px;">
                    <label>💸 Расход по заказу</label>
                    <input type="number" id="orderExpense" value="0" step="100">
                </div>
                <div class="cart-list" id="cartList"></div>
                <div class="row-2"><div class="discount-group"><label>Скидка, %</label><input type="number" id="discountPercent" value="0" step="1"></div><div class="discount-group"><label>Скидка, ₽</label><input type="number" id="discountAmount" value="0" step="10"></div><button id="applyDiscountBtn" class="btn-outline">Применить</button></div>
                <div class="row-2"><label><input type="radio" name="payment" value="cash" checked> 💵 Наличные</label><label><input type="radio" name="payment" value="card"> 💳 Карта</label></div>
                <div class="total-line"><span>Подытог</span><span id="cartSubtotal">0 ₽</span></div>
                <div class="total-line" id="discountLine" style="display:none;"><span>Скидка</span><span id="cartDiscount">0 ₽</span></div>
                <div class="total-line"><span>💰 Итого</span><span id="cartTotal">0 ₽</span></div>
                <div class="total-line"><span>💸 Расход</span><span id="cartExpense">0 ₽</span></div>
                <div class="total-line total-profit"><span>📊 Прибыль</span><span id="cartProfit">0 ₽</span></div>
                <div class="row-2"><button id="completeOrderBtn" class="btn-primary" style="flex:2;">✅ Оформить</button><button id="clearCartBtn" class="btn-outline" style="flex:1;">Очистить</button></div>
            </div>
        </div>

        <div class="history-section">
            <div class="panel-title">📜 ИСТОРИЯ ЗАКАЗОВ</div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>
</div>

<div id="syncStatus" class="sync-status">💾 Готово</div>
<div id="reportModal" class="modal">...</div>
<div id="adminModal" class="modal">...</div>

<!-- Модалка редактирования -->
<div id="editOrderModal" class="modal">
    <div class="modal-card">
        <h3 style="margin-bottom:20px;">✏️ Редактирование заказа</h3>
        <input type="text" id="editClientName" placeholder="Имя клиента">
        <input type="text" id="editClientPhone" placeholder="Телефон" style="margin: 12px 0;">
        <div id="editItemsContainer" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;"></div>
        <div class="add-item-row">
            <input type="text" id="newItemName" placeholder="Название" style="flex:2;">
            <input type="number" id="newItemPrice" placeholder="Цена" style="width: 90px;">
            <input type="number" id="newItemQty" placeholder="Кол-во" value="1" style="width: 80px;">
            <button id="addNewItemBtn" style="background: var(--green); padding: 8px 12px;">➕</button>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
            <button id="saveEditBtn" class="btn-success">💾 Сохранить</button>
            <button id="cancelEditBtn" class="btn-outline">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ==========
    let operators = { "pavel": { password: "pavel123", name: "Павел", role: "admin", rate: 2500 }, "ksenia": { password: "ksenia123", name: "Ксения", role: "operator", rate: 2000 }, "natalia": { password: "natalia123", name: "Наталья", role: "operator", rate: 2000 } };
    let services = [{ id: 1, name: "Копирование ч/б A4", price: 25 }, { id: 2, name: "Копирование цветное A4", price: 35 }, { id: 3, name: "Сканирование A4", price: 25 }, { id: 4, name: "Ламинирование A4", price: 150 }, { id: 5, name: "Печать фото 10x15", price: 55 }, { id: 6, name: "Перевод документов", price: 200 }];
    let goods = [{ id: 1001, name: "Бумага А4", price: 350, stock: 50, unit: "пачка" }];
    let allOrders = [], currentUser = null, cart = [], discountPct = 0, discountAmt = 0;
    let shiftOpen = null, shiftClose = null, allShifts = [], cashData = { cashBalance: 0 };
    let editingOrderId = null;
    
    // Сохранение
    function saveOrders() { localStorage.setItem("a4print_orders", JSON.stringify(allOrders)); }
    function saveGoods() { localStorage.setItem("a4print_goods", JSON.stringify(goods)); }
    function saveServices() { localStorage.setItem("a4print_services", JSON.stringify(services)); }
    function saveShift() { localStorage.setItem("a4print_shift", JSON.stringify({ open: shiftOpen, close: shiftClose })); }
    
    function loadData() {
        let s = localStorage.getItem("a4print_services"); if (s) services = JSON.parse(s);
        let g = localStorage.getItem("a4print_goods"); if (g) goods = JSON.parse(g);
        let ord = localStorage.getItem("a4print_orders"); if (ord) allOrders = JSON.parse(ord);
        let shift = localStorage.getItem("a4print_shift"); if (shift) { let d = JSON.parse(shift); shiftOpen = d.open; shiftClose = d.close; }
        renderServices(); renderGoods(); renderCart(); renderHistory(); updateShiftUI();
        document.getElementById("currentOperatorName").innerHTML = `${currentUser.name}`;
    }
    
    // Отрисовка услуг
    function renderServices() {
        let grid = document.getElementById("servicesGrid");
        if (!grid) return;
        grid.innerHTML = "";
        services.forEach(s => {
            let card = document.createElement("div");
            card.className = "service-card";
            card.innerHTML = `<div class="item-name">${escapeHtml(s.name)}</div><div class="item-price">${s.price} ₽</div><div class="qty-control"><input type="number" id="qty_srv_${s.id}" value="1" min="1"></div><button class="add-btn" data-id="${s.id}">➕ Добавить</button>`;
            grid.appendChild(card);
        });
        document.querySelectorAll(".add-btn").forEach(btn => btn.onclick = () => addToCart('service', parseInt(btn.dataset.id)));
    }
    
    function renderGoods() {
        let grid = document.getElementById("goodsGrid");
        if (!grid) return;
        grid.innerHTML = "";
        goods.forEach(g => {
            let card = document.createElement("div");
            card.className = "goods-card";
            card.innerHTML = `<div class="item-name">${escapeHtml(g.name)}</div><div class="item-price">${g.price} ₽</div><div class="item-stock">📦 Остаток: ${g.stock}</div><div class="qty-control"><input type="number" id="qty_goods_${g.id}" value="1" min="1" max="${g.stock}"></div><button class="add-btn" data-id="${g.id}">➕ В корзину</button>`;
            grid.appendChild(card);
        });
        document.querySelectorAll(".add-btn").forEach(btn => btn.onclick = () => addToCart('goods', parseInt(btn.dataset.id)));
    }
    
    function addToCart(type, id) {
        let qtyInput = document.getElementById(`qty_${type === 'service' ? 'srv' : 'goods'}_${id}`);
        let qty = parseInt(qtyInput?.value) || 1;
        if (qty < 1) qty = 1;
        if (type === 'service') {
            let service = services.find(s => s.id === id);
            if (service) cart.push({ type: 'service', id: id, name: service.name, price: service.price, qty: qty });
        } else {
            let good = goods.find(g => g.id === id);
            if (good && qty <= good.stock) cart.push({ type: 'goods', id: id, name: good.name, price: good.price, qty: qty });
            else if (good) alert(`Недостаточно: ${good.stock} шт`);
        }
        renderCart();
        updateTotals();
    }
    
    function addFastService() {
        let name = document.getElementById("fastServiceName")?.value.trim();
        let price = parseFloat(document.getElementById("fastServicePrice")?.value);
        if (!name || isNaN(price) || price <= 0) { alert("Введите название и цену"); return; }
        cart.push({ type: 'service', id: Date.now(), name: name, price: price, qty: 1 });
        document.getElementById("fastServiceName").value = "";
        document.getElementById("fastServicePrice").value = "";
        renderCart();
        updateTotals();
    }
    
    function addNewGoods() {
        let name = document.getElementById("newGoodsName")?.value.trim();
        let price = parseFloat(document.getElementById("newGoodsPrice")?.value);
        let stock = parseInt(document.getElementById("newGoodsStock")?.value);
        if (!name || isNaN(price) || price <= 0 || isNaN(stock)) { alert("Заполните все поля"); return; }
        goods.push({ id: Date.now(), name: name, price: price, stock: stock, unit: "шт" });
        saveGoods();
        renderGoods();
        document.getElementById("newGoodsName").value = "";
        document.getElementById("newGoodsPrice").value = "";
        document.getElementById("newGoodsStock").value = "";
    }
    
    function renderCart() {
        let container = document.getElementById("cartList");
        if (!container) return;
        if (cart.length === 0) { container.innerHTML = "<div style='padding:30px;text-align:center;color:gray;'>Корзина пуста</div>"; updateTotals(); return; }
        let html = "";
        cart.forEach((item, idx) => {
            html += `<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${escapeHtml(item.name)}</div><div class="cart-item-detail">${item.qty} шт × ${item.price} ₽</div></div><div class="cart-item-price">${item.price * item.qty} ₽</div><button class="remove-btn" data-idx="${idx}">Удалить</button></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(".remove-btn").forEach(btn => btn.onclick = () => { cart.splice(parseInt(btn.dataset.idx), 1); renderCart(); updateTotals(); });
        updateTotals();
    }
    
    function updateTotals() {
        let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        let discount = discountPct > 0 ? subtotal * discountPct / 100 : discountAmt;
        if (discount > subtotal) discount = subtotal;
        let finalTotal = subtotal - discount;
        let expense = parseFloat(document.getElementById("orderExpense")?.value) || 0;
        document.getElementById("cartSubtotal").innerHTML = subtotal + " ₽";
        if (discount > 0) { document.getElementById("discountLine").style.display = "flex"; document.getElementById("cartDiscount").innerHTML = discount + " ₽"; }
        else { document.getElementById("discountLine").style.display = "none"; }
        document.getElementById("cartTotal").innerHTML = finalTotal + " ₽";
        document.getElementById("cartExpense").innerHTML = expense + " ₽";
        document.getElementById("cartProfit").innerHTML = (finalTotal - expense) + " ₽";
    }
    
    function applyDiscount() {
        discountPct = parseFloat(document.getElementById("discountPercent")?.value) || 0;
        discountAmt = parseFloat(document.getElementById("discountAmount")?.value) || 0;
        if (discountPct > 0 && discountAmt > 0) alert("Выберите один тип скидки");
        updateTotals();
    }
    
    function completeOrder() {
        if (cart.length === 0) { alert("Корзина пуста"); return; }
        if (!shiftOpen || shiftClose) { alert("Смена не открыта!"); return; }
        let client = document.getElementById("clientName")?.value.trim() || "Клиент";
        let phone = document.getElementById("clientPhone")?.value.trim() || "";
        let payment = document.querySelector('input[name="payment"]:checked')?.value || "cash";
        let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        let discount = discountPct > 0 ? subtotal * discountPct / 100 : discountAmt;
        if (discount > subtotal) discount = subtotal;
        let finalTotal = subtotal - discount;
        let expense = parseFloat(document.getElementById("orderExpense")?.value) || 0;
        let profit = finalTotal - expense;
        
        let order = { id: Date.now(), client, phone, date: new Date().toLocaleString(), items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })), subtotal, discount, discountPercent: discountPct, discountAmount: discountAmt, finalTotal, orderExpense: expense, profit, paymentMethod: payment, operator: currentUser.name };
        allOrders.unshift(order);
        saveOrders();
        
        // Обновляем остатки товаров
        cart.forEach(item => { if (item.type === 'goods') { let g = goods.find(g => g.id === item.id); if (g) g.stock -= item.qty; } });
        saveGoods(); renderGoods();
        
        cart = []; discountPct = 0; discountAmt = 0;
        document.getElementById("discountPercent").value = 0;
        document.getElementById("discountAmount").value = 0;
        document.getElementById("clientName").value = "";
        document.getElementById("clientPhone").value = "";
        document.getElementById("orderExpense").value = "0";
        renderCart();
        renderHistory();
        updateShiftFinance();
        alert(`✅ Заказ на ${finalTotal} ₽ оформлен`);
    }
    
    // ========== ИСТОРИЯ С КНОПКАМИ (ГЛАВНОЕ) ==========
    function renderHistory() {
        let container = document.getElementById("historyList");
        if (!container) return;
        if (allOrders.length === 0) { container.innerHTML = "<div style='padding:40px;text-align:center;color:gray;'>Нет заказов</div>"; return; }
        let html = "";
        allOrders.forEach(order => {
            let itemsText = order.items.map(i => `${i.name} x${i.qty}`).join(", ");
            html += `
                <div class="history-item" data-order-id="${order.id}">
                    <div class="history-header">
                        <div class="history-info">
                            <strong>${escapeHtml(order.client)}</strong> ${order.phone ? `📞 ${escapeHtml(order.phone)}` : ""} | ${order.date} | <strong>${order.finalTotal} ₽</strong> | 💰 прибыль: ${order.profit || 0} ₽
                        </div>
                        <div class="history-actions">
                            <button class="edit-order-btn" data-id="${order.id}">✏️ Ред.</button>
                            <button class="delete-order-btn" data-id="${order.id}">🗑 Удалить</button>
                        </div>
                    </div>
                    <div class="history-items">${escapeHtml(itemsText)}</div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        // Назначаем обработчики
        document.querySelectorAll(".edit-order-btn").forEach(btn => btn.onclick = () => openEditOrder(parseInt(btn.dataset.id)));
        document.querySelectorAll(".delete-order-btn").forEach(btn => btn.onclick = () => deleteOrder(parseInt(btn.dataset.id)));
    }
    
    function openEditOrder(orderId) {
        let order = allOrders.find(o => o.id === orderId);
        if (!order) { alert("Заказ не найден"); return; }
        editingOrderId = orderId;
        document.getElementById("editClientName").value = order.client || "";
        document.getElementById("editClientPhone").value = order.phone || "";
        
        let container = document.getElementById("editItemsContainer");
        container.innerHTML = "";
        
        order.items.forEach((item, idx) => {
            let div = document.createElement("div");
            div.className = "edit-item-row";
            div.innerHTML = `
                <span class="edit-item-name">${escapeHtml(item.name)}</span>
                <span class="edit-item-price">${item.price} ₽</span>
                <input type="number" class="edit-item-qty" id="editQty_${idx}" value="${item.qty}" min="1">
                <button class="remove-edit-item" data-idx="${idx}">✕</button>
            `;
            container.appendChild(div);
        });
        
        document.querySelectorAll(".remove-edit-item").forEach(btn => {
            btn.onclick = () => {
                let idx = parseInt(btn.dataset.idx);
                order.items.splice(idx, 1);
                openEditOrder(orderId);
            };
        });
        
        document.getElementById("addNewItemBtn").onclick = () => {
            let newName = document.getElementById("newItemName").value.trim();
            let newPrice = parseFloat(document.getElementById("newItemPrice").value);
            let newQty = parseInt(document.getElementById("newItemQty").value) || 1;
            if (!newName || isNaN(newPrice) || newPrice <= 0) { alert("Введите название и цену"); return; }
            order.items.push({ name: newName, price: newPrice, qty: newQty });
            document.getElementById("newItemName").value = "";
            document.getElementById("newItemPrice").value = "";
            document.getElementById("newItemQty").value = "1";
            openEditOrder(orderId);
        };
        
        document.getElementById("editOrderModal").style.display = "flex";
    }
    
    function saveEditedOrder() {
        let order = allOrders.find(o => o.id === editingOrderId);
        if (!order) return;
        
        order.client = document.getElementById("editClientName").value.trim() || "Клиент";
        order.phone = document.getElementById("editClientPhone").value.trim();
        
        for (let i = 0; i < order.items.length; i++) {
            let qtyInput = document.getElementById(`editQty_${i}`);
            if (qtyInput) {
                let newQty = parseInt(qtyInput.value);
                if (isNaN(newQty) || newQty < 1) newQty = 1;
                order.items[i].qty = newQty;
            }
        }
        
        // Пересчёт
        let subtotal = 0;
        order.items.forEach(it => { subtotal += it.price * it.qty; });
        let discount = order.discountPercent ? subtotal * order.discountPercent / 100 : (order.discountAmount || 0);
        if (discount > subtotal) discount = subtotal;
        order.subtotal = subtotal;
        order.discount = discount;
        order.finalTotal = subtotal - discount;
        order.profit = order.finalTotal - (order.orderExpense || 0);
        
        saveOrders();
        renderHistory();
        updateShiftFinance();
        document.getElementById("editOrderModal").style.display = "none";
        showStatus("✅ Заказ обновлён");
    }
    
    function deleteOrder(orderId) {
        if (confirm("Удалить этот заказ навсегда?")) {
            allOrders = allOrders.filter(o => o.id !== orderId);
            saveOrders();
            renderHistory();
            updateShiftFinance();
            showStatus("🗑 Заказ удалён");
        }
    }
    
    // ========== СМЕНА ==========
    function updateShiftUI() {
        let st = document.getElementById("shiftStatus"), op = document.getElementById("shiftOpenTime"), cl = document.getElementById("shiftCloseTime"), btn = document.getElementById("shiftToggleBtn");
        if (shiftOpen && !shiftClose) {
            st.innerText = "🟢 Открыта"; op.innerText = shiftOpen; cl.innerText = "—";
            btn.innerText = "🔒 Закрыть смену"; btn.classList.remove("btn-warning"); btn.classList.add("btn-danger");
        } else {
            st.innerText = shiftOpen ? "🔴 Закрыта" : "⚫ Не открыта"; op.innerText = shiftOpen || "—"; cl.innerText = shiftClose || "—";
            btn.innerText = "🚀 Открыть смену"; btn.classList.remove("btn-danger"); btn.classList.add("btn-warning");
        }
    }
    
    function toggleShift() {
        if (!shiftOpen || shiftClose) {
            shiftOpen = new Date().toLocaleString(); shiftClose = null; saveShift(); updateShiftUI(); updateShiftFinance(); alert("✅ Смена открыта");
        } else {
            shiftClose = new Date().toLocaleString(); saveShift(); updateShiftUI(); updateShiftFinance(); alert("✅ Смена закрыта");
        }
    }
    
    function updateShiftFinance() {
        if (!shiftOpen) return;
        let shiftOrders = allOrders.filter(o => o.date >= shiftOpen && (!shiftClose || o.date <= shiftClose));
        let revenue = shiftOrders.reduce((s, o) => s + o.finalTotal, 0);
        let cash = shiftOrders.filter(o => o.paymentMethod === "cash").reduce((s, o) => s + o.finalTotal, 0);
        let card = shiftOrders.filter(o => o.paymentMethod === "card").reduce((s, o) => s + o.finalTotal, 0);
        let profit = shiftOrders.reduce((s, o) => s + (o.profit || 0), 0);
        document.getElementById("shiftRevenue").innerHTML = revenue + " ₽";
        document.getElementById("shiftCash").innerHTML = cash + " ₽";
        document.getElementById("shiftCard").innerHTML = card + " ₽";
        document.getElementById("shiftProfit").innerHTML = profit + " ₽";
    }
    
    function showStatus(msg) { let d = document.getElementById("syncStatus"); if (d) { d.textContent = msg; setTimeout(() => { if (d.textContent === msg) d.textContent = "💾 Готово"; }, 2000); } }
    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function toggleTheme() { document.body.classList.toggle("dark"); localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light"); }
    
    function login() {
        let sel = document.getElementById("loginSelect").value;
        let pwd = document.getElementById("loginPassword").value;
        if (!sel) { document.getElementById("loginError").innerText = "Выберите оператора"; return; }
        let u = operators[sel];
        if (u && u.password === pwd) {
            currentUser = { ...u, username: sel };
            localStorage.setItem("currentUser", JSON.stringify(currentUser));
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            loadData();
            initBurger();
        } else { document.getElementById("loginError").innerText = "Неверный пароль"; }
    }
    
    function logout() { localStorage.clear(); location.reload(); }
    
    function initBurger() {
        let btn = document.getElementById("burgerBtn"), menu = document.getElementById("burgerMenu");
        if (btn && menu) {
            menu.innerHTML = `<span>${currentUser.name}</span><button id="burgerThemeToggle">🌙 Тёмная</button><button id="burgerShiftBtn">🚀 Смена</button><button id="burgerLogoutBtn">Выйти</button>`;
            btn.onclick = (e) => { e.stopPropagation(); menu.classList.toggle("show"); };
            document.addEventListener("click", (e) => { if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove("show"); });
            document.getElementById("burgerThemeToggle").onclick = toggleTheme;
            document.getElementById("burgerShiftBtn").onclick = () => { toggleShift(); menu.classList.remove("show"); };
            document.getElementById("burgerLogoutBtn").onclick = logout;
        }
    }
    
    // Запуск
    document.addEventListener("DOMContentLoaded", () => {
        let saved = localStorage.getItem("currentUser");
        let theme = localStorage.getItem("theme");
        if (theme === "dark") document.body.classList.add("dark");
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                if (operators[currentUser.username]) {
                    document.getElementById("loginOverlay").style.display = "none";
                    document.getElementById("mainContent").style.display = "block";
                    loadData();
                    initBurger();
                } else logout();
            } catch(e) { logout(); }
        } else { initBurger(); }
        
        document.getElementById("themeToggleBtn").onclick = toggleTheme;
        document.getElementById("loginBtn").onclick = login;
        document.getElementById("logoutBtn").onclick = logout;
        document.getElementById("applyDiscountBtn").onclick = applyDiscount;
        document.getElementById("completeOrderBtn").onclick = completeOrder;
        document.getElementById("clearCartBtn").onclick = () => { cart = []; discountPct = 0; discountAmt = 0; renderCart(); updateTotals(); };
        document.getElementById("addFastServiceBtn").onclick = addFastService;
        document.getElementById("addNewGoodsBtn").onclick = addNewGoods;
        document.getElementById("shiftToggleBtn").onclick = toggleShift;
        document.getElementById("reportMainBtn").onclick = () => alert("Отчёт в разработке");
        document.getElementById("adminPanelBtn").onclick = () => alert("Админ-панель");
        document.getElementById("saveEditBtn").onclick = saveEditedOrder;
        document.getElementById("cancelEditBtn").onclick = () => document.getElementById("editOrderModal").style.display = "none";
        
        let ss = document.getElementById("searchService");
        if (ss) ss.oninput = () => { let q = ss.value.toLowerCase(); let filtered = services.filter(s => s.name.toLowerCase().includes(q)); let grid = document.getElementById("servicesGrid"); if (grid) { grid.innerHTML = ""; filtered.forEach(s => { grid.innerHTML += `<div class="service-card"><div class="item-name">${escapeHtml(s.name)}</div><div class="item-price">${s.price} ₽</div><div class="qty-control"><input type="number" id="qty_srv_${s.id}" value="1"></div><button class="add-btn" data-id="${s.id}">➕ Добавить</button></div>`; }); document.querySelectorAll(".add-btn").forEach(btn => btn.onclick = () => addToCart('service', parseInt(btn.dataset.id))); } };
        
        let sg = document.getElementById("searchGoods");
        if (sg) sg.oninput = () => { let q = sg.value.toLowerCase(); let filtered = goods.filter(g => g.name.toLowerCase().includes(q)); let grid = document.getElementById("goodsGrid"); if (grid) { grid.innerHTML = ""; filtered.forEach(g => { grid.innerHTML += `<div class="goods-card"><div class="item-name">${escapeHtml(g.name)}</div><div class="item-price">${g.price} ₽</div><div class="item-stock">📦 Остаток: ${g.stock}</div><div class="qty-control"><input type="number" id="qty_goods_${g.id}" value="1" max="${g.stock}"></div><button class="add-btn" data-id="${g.id}">➕ В корзину</button></div>`; }); document.querySelectorAll(".add-btn").forEach(btn => btn.onclick = () => addToCart('goods', parseInt(btn.dataset.id))); } };
        
        let tabs = document.querySelectorAll('.category-tab');
        let panels = { services: document.getElementById('servicesPanel'), goods: document.getElementById('goodsPanel') };
        tabs.forEach(tab => { tab.onclick = () => { tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); Object.values(panels).forEach(p => p.classList.remove('active')); panels[tab.dataset.cat].classList.add('active'); }; });
        
        window.onclick = (e) => { if (e.target === document.getElementById("editOrderModal")) document.getElementById("editOrderModal").style.display = "none"; };
    });
</script>
</body>
</html>
