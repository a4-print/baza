<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>A4-Принт | Сервисный центр</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --blue: #3b82f6;
            --blue-dark: #2563eb;
            --orange: #f59e0b;
            --green: #10b981;
            --red: #ef4444;
            --purple: #8b5cf6;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --white: #ffffff;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        body {
            background: var(--gray-50);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
            padding: 24px;
            color: var(--gray-800);
        }
        
        body.dark {
            background: #1e293b;
            color: #e2e8f0;
        }
        
        body.dark .card, body.dark .cart-panel, body.dark .history-section, body.dark .header, body.dark .shift-bar, body.dark .modal-card {
            background: #334155;
            border-color: #475569;
        }
        
        body.dark .service-card, body.dark .repair-item, body.dark .cart-item, body.dark .history-item {
            background: #1e293b;
            border-color: #475569;
        }
        
        body.dark input, body.dark select, body.dark textarea {
            background: #1e293b;
            border-color: #475569;
            color: #e2e8f0;
        }
        
        .app { max-width: 1600px; margin: 0 auto; }
        
        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }
        
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo { height: 44px; width: auto; border-radius: 8px; }
        h1 { font-size: 20px; font-weight: 700; color: var(--gray-800); }
        .sub { font-size: 12px; color: var(--gray-500); }
        
        .user-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--gray-100);
            padding: 6px 20px;
            border-radius: 40px;
        }
        
        button {
            background: var(--blue);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        button:hover { background: var(--blue-dark); transform: translateY(-1px); }
        
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { background: var(--gray-100); transform: none; }
        .btn-primary { background: var(--blue); }
        .btn-success { background: var(--green); }
        .btn-danger { background: var(--red); }
        .btn-warning { background: var(--orange); }
        .btn-purple { background: var(--purple); }
        
        .dashboard {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .left-panel {
            flex: 1.5;
            min-width: 320px;
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
        }
        
        .right-panel {
            flex: 1;
            min-width: 300px;
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
        }
        
        .history-section {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
        }
        
        .panel-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-500);
            margin-bottom: 20px;
        }
        
        /* Форма приёма */
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 120px;
        }
        .form-group label {
            font-size: 11px;
            font-weight: 500;
            display: block;
            margin-bottom: 4px;
            color: var(--gray-500);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--white);
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
        }
        
        /* Сетка брендов */
        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .brand-card {
            background: var(--gray-100);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--gray-200);
        }
        .brand-card:hover { background: var(--gray-200); transform: translateY(-2px); }
        .brand-card.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }
        
        .models-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .model-item {
            background: var(--gray-100);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
        }
        .model-item:hover { background: var(--gray-200); }
        .model-item.selected {
            background: var(--blue);
            color: white;
        }
        
        /* Список ремонтов */
        .repairs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .repair-item {
            background: var(--gray-100);
            border-radius: 12px;
            padding: 14px;
            border-left: 4px solid var(--orange);
            transition: all 0.15s;
        }
        .repair-item:hover { transform: translateX(4px); }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-new { background: #fef3c7; color: #d97706; }
        .status-diagnostic { background: #e0e7ff; color: #4f46e5; }
        .status-repair { background: #dbeafe; color: #2563eb; }
        .status-ready { background: #d1fae5; color: #059669; }
        .status-given { background: #e5e7eb; color: #4b5563; }
        
        body.dark .status-new { background: #451a03; color: #fbbf24; }
        body.dark .status-diagnostic { background: #312e81; color: #a5b4fc; }
        body.dark .status-repair { background: #1e3a8a; color: #60a5fa; }
        body.dark .status-ready { background: #064e3b; color: #34d399; }
        body.dark .status-given { background: #374151; color: #9ca3af; }
        
        .repair-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            margin-bottom: 16px;
        }
        
        /* Модалка */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            box-shadow: var(--shadow-md);
        }
        
        .burger-btn { display: none; background: transparent; font-size: 24px; color: var(--gray-700); padding: 8px; }
        .burger-menu {
            position: absolute;
            top: 70px;
            right: 20px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            min-width: 200px;
            display: none;
            flex-direction: column;
            gap: 10px;
            box-shadow: var(--shadow-md);
            z-index: 200;
            border: 1px solid var(--gray-200);
        }
        .burger-menu.show { display: flex; }
        .burger-menu button { width: 100%; text-align: center; }
        
        @media (max-width: 850px) {
            body { padding: 16px; }
            .user-bar { display: none !important; }
            .burger-btn { display: block; }
            .dashboard { flex-direction: column; }
        }
        @media (min-width: 851px) { .burger-menu { display: none !important; } }
    </style>
</head>
<body>

    <!-- Форма входа -->
    <div id="loginOverlay" class="modal" style="display: flex;">
        <div class="modal-card" style="max-width: 380px;">
            <div style="text-align:center; margin-bottom: 20px;">
                <img src="https://github.com/a4print2026-jpg/baza/blob/dbcda72ab60f0a9f8d8984e17375f6649cf677f0/images/logo_soc2.png?raw=true" style="height: 60px; margin-bottom: 10px;" onerror="this.style.display='none'">
                <h2>A4-Принт | Сервисный центр</h2>
            </div>
            <select id="loginSelect" class="login-select" style="width:100%; padding: 12px; border-radius: 8px; margin-bottom: 12px;">
                <option value="">— Выберите оператора —</option>
                <option value="pavel">Павел (Администратор)</option>
                <option value="ksenia">Ксения (Оператор)</option>
                <option value="natalia">Наталья (Оператор)</option>
            </select>
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn" style="width:100%; margin-top: 20px;">Войти</button>
            <div id="loginError" style="color:var(--red); margin-top: 16px; text-align:center;"></div>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="app">
            <div class="header">
                <div class="logo-area">
                    <img src="https://github.com/a4print2026-jpg/baza/blob/dbcda72ab60f0a9f8d8984e17375f6649cf677f0/images/logo_soc2.png?raw=true" class="logo" onerror="this.style.display='none'">
                    <div><h1>A4‑ПРИНТ</h1><div class="sub">Сервисный центр | Ремонт оборудования</div></div>
                </div>
                <div class="user-bar">
                    <span id="currentOperatorName" style="font-weight:500;"></span>
                    <button id="themeToggleBtn" class="btn-outline">🌙 Тёмная</button>
                    <button id="adminPanelBtn" class="btn-primary">Админ</button>
                    <button id="logoutBtn" class="btn-outline">Выйти</button>
                </div>
                <button class="burger-btn" id="burgerBtn">☰</button>
                <div class="burger-menu" id="burgerMenu">
                    <span id="burgerOperatorName" style="font-weight:600; padding-bottom:8px;"></span>
                    <button id="burgerThemeToggle">🌙 Тёмная</button>
                    <button id="burgerAdminBtn">Админ</button>
                    <button id="burgerLogoutBtn">Выйти</button>
                </div>
            </div>

            <div class="dashboard">
                <!-- Левая панель: приём в ремонт -->
                <div class="left-panel">
                    <div class="panel-title">🔧 ПРИЁМ В РЕМОНТ</div>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex:2;">
                            <label>Клиент</label>
                            <input type="text" id="clientName" placeholder="Имя клиента">
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="text" id="clientPhone" placeholder="Телефон">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Выберите бренд</label>
                        <div class="brands-grid" id="brandsGrid"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Выберите модель</label>
                        <div class="models-list" id="modelsList"></div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Тип поломки</label>
                            <select id="faultType">
                                <option value="Не включается">Не включается</option>
                                <option value="Не печатает">Не печатает</option>
                                <option value="Зажевывает бумагу">Зажевывает бумагу</option>
                                <option value="Полосы при печати">Полосы при печати</option>
                                <option value="Ошибка картриджа">Ошибка картриджа</option>
                                <option value="Проблема с драйвером">Проблема с драйвером</option>
                                <option value="Механическая поломка">Механическая поломка</option>
                                <option value="Другое">Другое</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Срочность</label>
                            <select id="urgency">
                                <option value="Обычная">Обычная</option>
                                <option value="Срочно">Срочно</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Описание проблемы</label>
                        <textarea id="faultDesc" rows="2" placeholder="Подробное описание неисправности..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Комплектация</label>
                        <textarea id="accessories" rows="1" placeholder="Кабель, блок питания, картриджи..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Предоплата (₽)</label>
                            <input type="number" id="prepayment" value="0" step="500">
                        </div>
                        <div class="form-group">
                            <label>Ориентир. стоимость</label>
                            <input type="number" id="estimatedCost" value="0" step="500">
                        </div>
                    </div>
                    
                    <button id="addRepairBtn" class="btn-primary" style="width:100%; margin-top: 16px;">➕ Принять в ремонт</button>
                </div>
                
                <!-- Правая панель: быстрые действия -->
                <div class="right-panel">
                    <div class="panel-title">📊 СТАТИСТИКА</div>
                    <div id="statsRepairs" style="margin-bottom: 20px;">
                        <div>📦 В ремонте: <strong id="statInRepair">0</strong></div>
                        <div>✅ Готово к выдаче: <strong id="statReady">0</strong></div>
                        <div>💰 Общая выручка: <strong id="statRevenue">0 ₽</strong></div>
                    </div>
                    
                    <div class="panel-title">🔍 ПОИСК</div>
                    <input type="text" id="searchRepairs" class="search-input" placeholder="Поиск по клиенту, модели, серийному номеру...">
                    
                    <div class="panel-title" style="margin-top: 16px;">📋 АКТИВНЫЕ РЕМОНТЫ</div>
                    <div id="repairsList" class="repairs-list"></div>
                </div>
            </div>
            
            <!-- История завершённых ремонтов -->
            <div class="history-section">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;">
                    <div class="panel-title" style="margin-bottom:0;">📜 ЗАВЕРШЁННЫЕ РЕМОНТЫ</div>
                    <div style="display: flex; gap: 10px;">
                        <button id="exportExcelBtn" class="btn-success">📎 Excel</button>
                        <button id="clearCompletedBtn" class="btn-danger">🗑 Очистить завершённые</button>
                    </div>
                </div>
                <div id="completedRepairsList" class="repairs-list"></div>
            </div>
        </div>
    </div>

    <div id="syncStatus" class="sync-status" style="position: fixed; bottom: 20px; right: 20px; background: var(--gray-800); color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; z-index: 999;">💾 Готово</div>

    <!-- Админ-панель -->
    <div id="adminModal" class="modal">
        <div class="modal-card" style="max-width: 600px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2>Администрирование</h2>
                <button id="closeAdminModal" style="background:none; font-size: 24px;">✕</button>
            </div>
            <h3>Управление брендами и моделями</h3>
            <div id="adminBrandsList"></div>
            <div style="display:flex; gap:12px; margin: 16px 0;">
                <input type="text" id="newBrandName" placeholder="Новый бренд">
                <button id="addBrandBtn" class="btn-primary">Добавить бренд</button>
            </div>
            <div id="adminModelsList" style="margin-top: 20px;"></div>
            <div style="display:flex; gap:12px; margin: 16px 0;">
                <select id="selectBrandForModel" style="flex:1;"></select>
                <input type="text" id="newModelName" placeholder="Новая модель" style="flex:2;">
                <button id="addModelBtn" class="btn-primary">Добавить модель</button>
            </div>
        </div>
    </div>

    <div id="printBlankContainer" style="display: none;"></div>

    <script>
        // ========== ДАННЫЕ ==========
        let operators = { 
            "pavel": { password: "pavel123", name: "Павел", role: "admin" }, 
            "ksenia": { password: "ksenia123", name: "Ксения", role: "operator" }, 
            "natalia": { password: "natalia123", name: "Наталья", role: "operator" } 
        };
        
        // Бренды и модели
        let brands = [
            { id: 1, name: "HP" }, { id: 2, name: "Canon" }, { id: 3, name: "Epson" }, { id: 4, name: "Brother" }, { id: 5, name: "Xerox" }, { id: 6, name: "Kyocera" }, { id: 7, name: "Samsung" }, { id: 8, name: "Ricoh" }
        ];
        
        let models = [
            { id: 1, brandId: 1, name: "LaserJet Pro M404dn" }, { id: 2, brandId: 1, name: "LaserJet M110we" }, { id: 3, brandId: 1, name: "Neverstop 1000" },
            { id: 4, brandId: 2, name: "Pixma G3411" }, { id: 5, brandId: 2, name: "ImageRunner 2204" }, { id: 6, brandId: 2, name: "LBP 6030" },
            { id: 7, brandId: 3, name: "L3110" }, { id: 8, brandId: 3, name: "L805" }, { id: 9, brandId: 3, name: "WorkForce Pro" },
            { id: 10, brandId: 4, name: "HL-1210WR" }, { id: 11, brandId: 4, name: "DCP-L1630WR" }, { id: 12, brandId: 4, name: "MFC-L2700DW" }
        ];
        
        let repairs = [];
        let completedRepairs = [];
        let currentUser = null;
        let selectedBrandId = null;
        let selectedModelId = null;
        
        const BRANDS_KEY = "service_brands", MODELS_KEY = "service_models", REPAIRS_KEY = "service_repairs", COMPLETED_KEY = "service_completed";
        
        function saveBrands() { localStorage.setItem(BRANDS_KEY, JSON.stringify(brands)); }
        function saveModels() { localStorage.setItem(MODELS_KEY, JSON.stringify(models)); }
        function saveRepairs() { localStorage.setItem(REPAIRS_KEY, JSON.stringify(repairs)); }
        function saveCompleted() { localStorage.setItem(COMPLETED_KEY, JSON.stringify(completedRepairs)); }
        
        function loadData() {
            let b = localStorage.getItem(BRANDS_KEY); if (b) brands = JSON.parse(b);
            let m = localStorage.getItem(MODELS_KEY); if (m) models = JSON.parse(m);
            let r = localStorage.getItem(REPAIRS_KEY); if (r) repairs = JSON.parse(r);
            let c = localStorage.getItem(COMPLETED_KEY); if (c) completedRepairs = JSON.parse(c);
            renderBrands();
            renderRepairs();
            renderCompleted();
            updateStats();
        }
        
        // Рендер брендов
        function renderBrands() {
            const grid = document.getElementById("brandsGrid");
            if (!grid) return;
            grid.innerHTML = "";
            brands.forEach(b => {
                let card = document.createElement("div");
                card.className = "brand-card" + (selectedBrandId === b.id ? " active" : "");
                card.innerText = b.name;
                card.onclick = () => { selectBrand(b.id); };
                grid.appendChild(card);
            });
        }
        
        function selectBrand(brandId) {
            selectedBrandId = brandId;
            selectedModelId = null;
            renderBrands();
            renderModels();
        }
        
        function renderModels() {
            const container = document.getElementById("modelsList");
            if (!container) return;
            if (!selectedBrandId) {
                container.innerHTML = "<div style='padding:20px;text-align:center;color:var(--gray-500);'>Сначала выберите бренд</div>";
                return;
            }
            const brandModels = models.filter(m => m.brandId === selectedBrandId);
            if (brandModels.length === 0) {
                container.innerHTML = "<div style='padding:20px;text-align:center;color:var(--gray-500);'>Нет моделей для выбранного бренда</div>";
                return;
            }
            container.innerHTML = "";
            brandModels.forEach(m => {
                let item = document.createElement("div");
                item.className = "model-item" + (selectedModelId === m.id ? " selected" : "");
                item.innerHTML = `<span>${m.name}</span>`;
                item.onclick = () => { 
                    selectedModelId = m.id; 
                    renderModels(); 
                };
                container.appendChild(item);
            });
        }
        
        // Добавление ремонта
        function addRepair() {
            let client = document.getElementById("clientName").value.trim();
            let phone = document.getElementById("clientPhone").value.trim();
            if (!client && !phone) { alert("Укажите имя или телефон клиента"); return; }
            if (!selectedBrandId) { alert("Выберите бренд"); return; }
            if (!selectedModelId) { alert("Выберите модель"); return; }
            
            let brand = brands.find(b => b.id === selectedBrandId);
            let model = models.find(m => m.id === selectedModelId);
            let faultType = document.getElementById("faultType").value;
            let urgency = document.getElementById("urgency").value;
            let faultDesc = document.getElementById("faultDesc").value;
            let accessories = document.getElementById("accessories").value;
            let prepayment = parseFloat(document.getElementById("prepayment").value) || 0;
            let estimatedCost = parseFloat(document.getElementById("estimatedCost").value) || 0;
            
            let newRepair = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                client: client || "Клиент",
                phone: phone,
                brandId: selectedBrandId,
                brandName: brand.name,
                modelId: selectedModelId,
                modelName: model.name,
                faultType: faultType,
                urgency: urgency,
                faultDesc: faultDesc,
                accessories: accessories,
                prepayment: prepayment,
                estimatedCost: estimatedCost,
                finalCost: null,
                status: "new",
                statusName: "Назначен",
                comment: "",
                operator: currentUser.name
            };
            repairs.push(newRepair);
            saveRepairs();
            renderRepairs();
            updateStats();
            
            // Очистка формы
            document.getElementById("clientName").value = "";
            document.getElementById("clientPhone").value = "";
            document.getElementById("faultDesc").value = "";
            document.getElementById("accessories").value = "";
            document.getElementById("prepayment").value = "0";
            document.getElementById("estimatedCost").value = "0";
            selectedBrandId = null;
            selectedModelId = null;
            renderBrands();
            renderModels();
            
            alert(`✅ Ремонт №${newRepair.id} принят!`);
        }
        
        function getStatusBadge(status, statusName) {
            const classes = {
                'new': 'status-new',
                'diagnostic': 'status-diagnostic',
                'repair': 'status-repair',
                'ready': 'status-ready',
                'given': 'status-given'
            };
            const names = {
                'new': 'Назначен',
                'diagnostic': 'Диагностика',
                'repair': 'Ремонт',
                'ready': 'Готов к выдаче',
                'given': 'Выдан'
            };
            return `<span class="status-badge ${classes[status]}">${names[status] || statusName}</span>`;
        }
        
        function renderRepairs() {
            const container = document.getElementById("repairsList");
            if (!container) return;
            let searchTerm = document.getElementById("searchRepairs")?.value.toLowerCase() || "";
            let filtered = repairs.filter(r => 
                r.client.toLowerCase().includes(searchTerm) || 
                r.modelName.toLowerCase().includes(searchTerm) ||
                r.phone.includes(searchTerm)
            );
            if (filtered.length === 0) {
                container.innerHTML = "<div style='padding:40px;text-align:center;color:var(--gray-500);'>Нет активных ремонтов</div>";
                return;
            }
            let html = "";
            filtered.forEach(r => {
                let urgencyIcon = r.urgency === "Срочно" ? "⚠️ " : (r.urgency === "VIP" ? "⭐ " : "");
                html += `<div class="repair-item" data-id="${r.id}">
                            <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                                <span><strong>${urgencyIcon}${r.client}</strong> | ${r.brandName} ${r.modelName}</span>
                                <span>${getStatusBadge(r.status, r.statusName)}</span>
                            </div>
                            <div style="font-size:12px; margin-top:6px; color:var(--gray-500);">📞 ${r.phone || "—"} | 🔧 ${r.faultType}</div>
                            <div style="font-size:12px; margin-top:6px;">💰 Предоплата: ${r.prepayment} ₽ | Стоимость: ${r.estimatedCost} ₽</div>
                            ${r.comment ? `<div style="font-size:12px; margin-top:4px;">📝 ${r.comment}</div>` : ""}
                            <div class="repair-actions">
                                <select class="status-select" data-id="${r.id}" style="width:auto; padding:6px; font-size:12px;">
                                    <option value="new" ${r.status === "new" ? "selected" : ""}>Назначен</option>
                                    <option value="diagnostic" ${r.status === "diagnostic" ? "selected" : ""}>Диагностика</option>
                                    <option value="repair" ${r.status === "repair" ? "selected" : ""}>Ремонт</option>
                                    <option value="ready" ${r.status === "ready" ? "selected" : ""}>Готов к выдаче</option>
                                    <option value="given" ${r.status === "given" ? "selected" : ""}>Выдан</option>
                                </select>
                                <input type="number" id="finalCost_${r.id}" placeholder="Итоговая стоимость" style="width:120px; padding:6px;" value="${r.finalCost || ""}">
                                <textarea id="comment_${r.id}" placeholder="Комментарий" style="width:150px; padding:6px; font-size:12px;" rows="1">${r.comment || ""}</textarea>
                                <button class="update-repair" data-id="${r.id}" style="padding:6px 12px;">Обновить</button>
                                <button class="complete-repair" data-id="${r.id}" style="background:var(--green); padding:6px 12px;">✅ Выдать</button>
                                <button class="delete-repair" data-id="${r.id}" style="background:var(--red); padding:6px 12px;">🗑 Удалить</button>
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
            
            document.querySelectorAll(".update-repair").forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.getAttribute("data-id"));
                    let repair = repairs.find(r => r.id === id);
                    if (repair) {
                        let newStatus = document.querySelector(`.status-select[data-id="${id}"]`).value;
                        let finalCost = parseFloat(document.getElementById(`finalCost_${id}`).value);
                        let comment = document.getElementById(`comment_${id}`).value;
                        repair.status = newStatus;
                        if (finalCost && !isNaN(finalCost)) repair.finalCost = finalCost;
                        if (comment) repair.comment = comment;
                        saveRepairs();
                        renderRepairs();
                        updateStats();
                        showSyncStatus(`✅ Статус обновлён: ${repair.client}`);
                    }
                };
            });
            document.querySelectorAll(".complete-repair").forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.getAttribute("data-id"));
                    let repair = repairs.find(r => r.id === id);
                    if (repair && confirm(`Выдать ремонт клиенту ${repair.client}?`)) {
                        if (!repair.finalCost) {
                            let cost = prompt("Введите итоговую стоимость ремонта:", repair.estimatedCost);
                            if (cost && !isNaN(cost)) repair.finalCost = parseFloat(cost);
                            else { alert("Укажите стоимость!"); return; }
                        }
                        repair.status = "given";
                        repair.closeDate = new Date().toLocaleString();
                        completedRepairs.unshift(repair);
                        repairs = repairs.filter(r => r.id !== id);
                        saveRepairs();
                        saveCompleted();
                        renderRepairs();
                        renderCompleted();
                        updateStats();
                        showSyncStatus(`✅ Ремонт завершён и выдан клиенту`);
                    }
                };
            });
            document.querySelectorAll(".delete-repair").forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.getAttribute("data-id"));
                    let repair = repairs.find(r => r.id === id);
                    if (repair && confirm(`Удалить ремонт ${repair.client}?`)) {
                        repairs = repairs.filter(r => r.id !== id);
                        saveRepairs();
                        renderRepairs();
                        updateStats();
                        showSyncStatus(`🗑 Ремонт удалён`);
                    }
                };
            });
        }
        
        function renderCompleted() {
            const container = document.getElementById("completedRepairsList");
            if (!container) return;
            if (completedRepairs.length === 0) {
                container.innerHTML = "<div style='padding:40px;text-align:center;color:var(--gray-500);'>Нет завершённых ремонтов</div>";
                return;
            }
            let html = "";
            completedRepairs.slice(0, 50).forEach(r => {
                html += `<div class="repair-item">
                            <div><strong>${r.client}</strong> | ${r.brandName} ${r.modelName}</div>
                            <div style="font-size:12px;">📅 Принят: ${r.date} | Выдан: ${r.closeDate}</div>
                            <div style="font-size:12px;">💰 Итого: ${r.finalCost} ₽ (предоплата: ${r.prepayment} ₽)</div>
                            <div style="font-size:12px;">🔧 ${r.faultType} | ${r.comment ? "📝 " + r.comment : ""}</div>
                        </div>`;
            });
            container.innerHTML = html;
        }
        
        function updateStats() {
            let inRepair = repairs.filter(r => r.status !== "given").length;
            let ready = repairs.filter(r => r.status === "ready").length;
            let revenue = completedRepairs.reduce((sum, r) => sum + (r.finalCost || 0), 0);
            document.getElementById("statInRepair").innerText = inRepair;
            document.getElementById("statReady").innerText = ready;
            document.getElementById("statRevenue").innerHTML = revenue.toLocaleString() + " ₽";
        }
        
        function exportExcel() {
            let data = [["ID", "Дата", "Клиент", "Телефон", "Бренд", "Модель", "Тип поломки", "Срочность", "Предоплата", "Итоговая стоимость", "Статус", "Оператор", "Комментарий", "Дата выдачи"]];
            [...repairs, ...completedRepairs].forEach(r => {
                data.push([r.id, r.date, r.client, r.phone || "", r.brandName, r.modelName, r.faultType, r.urgency, r.prepayment, r.finalCost || "", r.status === "given" ? "Выдан" : r.statusName, r.operator, r.comment || "", r.closeDate || ""]);
            });
            let ws = XLSX.utils.aoa_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ремонты");
            XLSX.writeFile(wb, `A4print_service_repairs_${new Date().toISOString().slice(0,10)}.xlsx`);
            showSyncStatus("📎 Excel скачан");
        }
        
        function clearCompleted() {
            if (confirm("Очистить все завершённые ремонты? Это действие нельзя отменить.")) {
                completedRepairs = [];
                saveCompleted();
                renderCompleted();
                updateStats();
                showSyncStatus("🗑 Завершённые ремонты очищены");
            }
        }
        
        // Админ-панель
        function renderAdminPanel() {
            let brandsDiv = document.getElementById("adminBrandsList");
            brandsDiv.innerHTML = "";
            brands.forEach(b => {
                brandsDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${b.name}</span><button class="delete-brand" data-id="${b.id}" style="background:var(--red); padding:4px 12px;">🗑</button></div>`;
            });
            document.querySelectorAll(".delete-brand").forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.getAttribute("data-id"));
                    if (brands.length <= 1) { alert("Нельзя удалить последний бренд"); return; }
                    let hasModels = models.some(m => m.brandId === id);
                    if (hasModels) { alert("Сначала удалите модели этого бренда"); return; }
                    brands = brands.filter(b => b.id !== id);
                    saveBrands();
                    renderAdminPanel();
                    renderBrands();
                };
            });
            
            let modelsDiv = document.getElementById("adminModelsList");
            modelsDiv.innerHTML = "<h4>Модели</h4>";
            models.forEach(m => {
                let brand = brands.find(b => b.id === m.brandId);
                modelsDiv.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${brand?.name || "?"} — ${m.name}</span><button class="delete-model" data-id="${m.id}" style="background:var(--red); padding:4px 12px;">🗑</button></div>`;
            });
            document.querySelectorAll(".delete-model").forEach(btn => {
                btn.onclick = () => {
                    let id = parseInt(btn.getAttribute("data-id"));
                    models = models.filter(m => m.id !== id);
                    saveModels();
                    renderAdminPanel();
                    renderModels();
                };
            });
            
            let brandSelect = document.getElementById("selectBrandForModel");
            brandSelect.innerHTML = "";
            brands.forEach(b => {
                let opt = document.createElement("option");
                opt.value = b.id;
                opt.textContent = b.name;
                brandSelect.appendChild(opt);
            });
        }
        
        // Поиск
        document.addEventListener("DOMContentLoaded", () => {
            let searchInput = document.getElementById("searchRepairs");
            if (searchInput) {
                searchInput.oninput = () => renderRepairs();
            }
        });
        
        function showSyncStatus(msg) {
            let d = document.getElementById("syncStatus");
            if (d) { d.textContent = msg; setTimeout(() => { if (d.textContent === msg) d.textContent = "💾 Готово"; }, 2000); }
        }
        
        function toggleTheme() { document.body.classList.toggle("dark"); localStorage.setItem("service_theme", document.body.classList.contains("dark") ? "dark" : "light"); }
        
        function login() {
            let selectedLogin = document.getElementById("loginSelect").value;
            let password = document.getElementById("loginPassword").value;
            if (!selectedLogin) { document.getElementById("loginError").innerText = "Выберите оператора"; return false; }
            let u = operators[selectedLogin];
            if (u && u.password === password) {
                currentUser = { ...u, username: selectedLogin };
                localStorage.setItem("service_current_user", JSON.stringify(currentUser));
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
                document.getElementById("currentOperatorName").innerHTML = `${currentUser.name} ${currentUser.role === "admin" ? "👑" : "👤"}`;
                document.getElementById("burgerOperatorName").innerText = `${currentUser.name} ${currentUser.role === "admin" ? "👑" : "👤"}`;
                loadData();
                return true;
            }
            document.getElementById("loginError").innerText = "Неверный пароль";
            return false;
        }
        
        function logout() { currentUser = null; localStorage.removeItem("service_current_user"); location.reload(); }
        
        function initBurger() {
            let btn = document.getElementById("burgerBtn"), menu = document.getElementById("burgerMenu");
            if (btn && menu) {
                btn.onclick = (e) => { e.stopPropagation(); menu.classList.toggle("show"); };
                document.addEventListener("click", (e) => { if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove("show"); });
            }
            document.getElementById("burgerThemeToggle").onclick = () => { toggleTheme(); if (menu) menu.classList.remove("show"); };
            document.getElementById("burgerAdminBtn").onclick = () => { if (currentUser?.role === "admin") { renderAdminPanel(); document.getElementById("adminModal").style.display = "flex"; } else alert("Доступно только администратору"); if (menu) menu.classList.remove("show"); };
            document.getElementById("burgerLogoutBtn").onclick = () => { logout(); if (menu) menu.classList.remove("show"); };
        }
        
        document.addEventListener("DOMContentLoaded", () => {
            let saved = localStorage.getItem("service_current_user");
            let theme = localStorage.getItem("service_theme");
            if (theme === "dark") document.body.classList.add("dark");
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    if (operators[currentUser.username]) {
                        document.getElementById("loginOverlay").style.display = "none";
                        document.getElementById("mainContent").style.display = "block";
                        document.getElementById("currentOperatorName").innerHTML = `${currentUser.name} ${currentUser.role === "admin" ? "👑" : "👤"}`;
                        document.getElementById("burgerOperatorName").innerText = `${currentUser.name} ${currentUser.role === "admin" ? "👑" : "👤"}`;
                        loadData();
                        initBurger();
                    } else logout();
                } catch(e) { logout(); }
            } else { initBurger(); }
            
            document.getElementById("themeToggleBtn").onclick = toggleTheme;
            document.getElementById("loginBtn").onclick = login;
            document.getElementById("logoutBtn").onclick = logout;
            document.getElementById("addRepairBtn").onclick = addRepair;
            document.getElementById("exportExcelBtn").onclick = exportExcel;
            document.getElementById("clearCompletedBtn").onclick = clearCompleted;
            
            let admModal = document.getElementById("adminModal");
            document.getElementById("adminPanelBtn").onclick = () => { renderAdminPanel(); admModal.style.display = "flex"; };
            document.getElementById("closeAdminModal").onclick = () => admModal.style.display = "none";
            document.getElementById("addBrandBtn").onclick = () => {
                let name = document.getElementById("newBrandName").value.trim();
                if (name) {
                    let newId = Date.now();
                    brands.push({ id: newId, name: name });
                    saveBrands();
                    renderAdminPanel();
                    renderBrands();
                    document.getElementById("newBrandName").value = "";
                    showSyncStatus(`✅ Бренд "${name}" добавлен`);
                } else alert("Введите название бренда");
            };
            document.getElementById("addModelBtn").onclick = () => {
                let brandId = parseInt(document.getElementById("selectBrandForModel").value);
                let name = document.getElementById("newModelName").value.trim();
                if (name && brandId) {
                    let newId = Date.now();
                    models.push({ id: newId, brandId: brandId, name: name });
                    saveModels();
                    renderAdminPanel();
                    renderModels();
                    document.getElementById("newModelName").value = "";
                    showSyncStatus(`✅ Модель "${name}" добавлена`);
                } else alert("Выберите бренд и введите название модели");
            };
            window.onclick = (e) => { if (e.target === admModal) admModal.style.display = "none"; };
        });
    </script>
</body>
</html>
